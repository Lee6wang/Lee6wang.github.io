<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

<script>
  window.siteBaseUrl = {{ site.baseurl | default: '' | jsonify }};
</script>

<script id="site-i18n-data" type="application/json">
{
  "paths": {
    "{{ '/' | relative_url }}": {
      "zh": "首页",
      "en": "Home"
    }{% for tab in site.tabs %},
    "{{ tab.url | relative_url }}": {
      "zh": {{ tab.title | jsonify }},
      "en": {{ tab.title_en | default: tab.title | jsonify }}
    }{% endfor %}
  },
  "posts": {
    {% for post in site.posts %}
    "{{ post.url | relative_url }}": {
      "zh": {{ post.title | jsonify }},
      "en": {{ post.title_en | default: post.title | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  }
}
</script>

<script defer src="{{ '/assets/lib/three.r134.min.js' | relative_url }}"></script>
<script defer src="{{ '/assets/lib/vanta.net.min.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/custom.js' | relative_url }}"></script>
<script defer src="{{ '/assets/js/i18n.js' | relative_url }}"></script>

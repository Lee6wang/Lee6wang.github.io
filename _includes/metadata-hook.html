<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

<script>
  window.siteBaseUrl = {{ site.baseurl | default: '' | jsonify }};
</script>

<script id="site-i18n-data" type="application/json">
{
  "site": {
    "title": {{ site.title | jsonify }},
    "tagline": {
      "zh": {{ site.tagline | jsonify }},
      "en": "Dexterous Robotic Hands and Embedded Engineering"
    }
  },
  "paths": {
    "{{ '/' | relative_url }}": {
      "zh": "机器人灵巧手与嵌入式工程实践",
      "en": "Robotics and Embedded Engineering"
    }{% for tab in site.tabs %},
    "{{ tab.url | relative_url }}": {
      "zh": {{ tab.title_zh | default: tab.title | jsonify }},
      "en": {{ tab.title_en | default: tab.title | jsonify }}
    }{% endfor %}
  },
  "posts": {
    {% for post in site.posts %}
    "{{ post.url | relative_url }}": {
      "zh": {{ post.title | jsonify }},
      "en": {{ post.title_en | default: post.title | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  },
  "ui": {
    "pairs": [
      ["首页", "Home"],
      ["关于", "About"],
      ["归档", "Archives"],
      ["分类", "Categories"],
      ["标签", "Tags"],
      ["摄影", "Photograph"],
      ["搜索", "Search"],
      ["取消", "Cancel"],
      ["文章", "Posts"],
      ["文章内容", "Contents"],
      ["最近更新", "Recently Updated"],
      ["热门标签", "Trending Tags"],
      ["阅读更多", "Read More"],
      ["上一篇", "Previous"],
      ["下一篇", "Next"],
      ["发表于", "Posted"],
      ["更新于", "Updated"],
      ["作者", "By"],
      ["分享", "Share"],
      ["相关文章", "Related Posts"],
      ["阅读", "Read"],
      ["分钟", "min"],
      ["保留部分权利。", "Some rights reserved."],
      ["本站采用", "Using the"],
      ["主题", "theme"],
      ["发现新版本的内容。", "A new version of content is available."],
      ["更新", "Update"],
      ["工程", "Engineering"],
      ["电机控制", "Motor Control"],
      ["工具链", "Toolchain"],
      ["随笔", "Reflection"],
      ["工作流", "Workflow"],
      ["固件", "Firmware"],
      ["时钟", "Clock"],
      ["嵌入式 C", "Embedded C"]
    ],
    "category": {
      "zh": {
        "category_one": "个分类",
        "category_other": "个分类",
        "post_one": "篇文章",
        "post_other": "篇文章"
      },
      "en": {
        "category_one": "category",
        "category_other": "categories",
        "post_one": "post",
        "post_other": "posts"
      }
    },
    "read_time": {
      "zh": {
        "prefix": "阅读",
        "unit": "分钟"
      },
      "en": {
        "prefix": "Read",
        "unit": "min"
      }
    }
  }
}
</script>

<script defer src="{{ '/assets/js/custom.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
<script defer src="{{ '/assets/js/i18n.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
